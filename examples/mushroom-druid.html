<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mushroom Druid — Pixel Art</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#161a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#e0e0e0;overflow:hidden}
h1{font-size:2.2rem;margin-bottom:2px;font-weight:800;background:linear-gradient(90deg,#fff,#bbb);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#777;font-size:.85rem;margin-bottom:6px}.sub a{color:#6B7FD7;text-decoration:none}
.prompt{color:#555;font-size:1.7rem;margin-bottom:20px;letter-spacing:3px}.prompt span{color:#7B8CDE}
.wrap{display:flex;align-items:center;gap:24px}
canvas#display{image-rendering:pixelated;image-rendering:crisp-edges}
.btn{width:52px;height:52px;background:linear-gradient(180deg,#333348,#252538);border:2px solid #3a3a55;border-radius:8px;color:#888;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s;user-select:none;box-shadow:0 3px 8px rgba(0,0,0,.4)}
.btn:hover{background:#3a3a5e;color:#ccc;border-color:#5a5a7e}.btn:active{transform:scale(.9)}
.ground{width:460px;height:2px;background:linear-gradient(90deg,transparent,#2a2a4a 30%,#2a2a4a 70%,transparent)}
.label{margin-top:12px;padding:4px 14px;background:#1e2040;border:1px solid #2a2d50;border-radius:16px;font-size:.78rem;color:#7B8CDE}
.hint{margin-top:14px;color:#444;font-size:.72rem}
</style>
</head>
<body>
<h1>One prompt &rarr; Fully animated</h1>
<p class="sub">This character was generated from a single text prompt.<br>Walk it around. <a href="#">Learn how</a></p>
<div class="prompt">&gt; <span>mushroom druid</span></div>
<div class="wrap">
  <button class="btn" id="bL">&#9664;</button>
  <canvas id="display" width="460" height="310"></canvas>
  <button class="btn" id="bR">&#9654;</button>
</div>
<div class="ground"></div>
<div class="label" id="lbl">idle</div>
<p class="hint">&#8592; &#8594; to walk &middot; space to cast spell</p>
<script>
// ══════════════════════════════════════════════════════
//  MUSHROOM DRUID V2 — Selout + AA + Dithering
// ══════════════════════════════════════════════════════
const display = document.getElementById('display');
const dctx = display.getContext('2d');
dctx.imageSmoothingEnabled = false;

const W = 56, H = 64;
const buf = document.createElement('canvas');
buf.width = W; buf.height = H;
const bc = buf.getContext('2d');

// ── PALETTE — 12 tones per material, hue-shifted ──
const P = {
  // === SELOUT OUTLINES (not pure black!) ===
  OC: '#3a1014',  // cap outline (dark red)
  OB: '#2a1810',  // brim outline (dark brown)
  OF: '#2a1810',  // face outline (warm dark)
  OG: '#0c1c0c',  // cloak outline (dark green)
  OW: '#1a1008',  // staff/feet outline (dark wood)
  OL: '#10080a',  // general dark outline (near-black, for high contrast areas)

  // === CAP REDS — shadows→purple, highlights→orange (12 tones) ===
  C0: '#3e0c14',  // anti-alias dark
  C1: '#4a1018',
  C2: '#5c1418',
  C3: '#72201e',
  C4: '#8c2828',
  C5: '#a83030',
  C6: '#c03838',
  C7: '#d44440',
  C8: '#e45448',
  C9: '#f06850',
  CA: '#f88060',
  CB: '#ffa878',  // brightest highlight

  // === SPOTS — warm cream with AA (7 tones) ===
  S0: '#a89070',
  S1: '#c0a888',
  S2: '#d0b898',
  S3: '#e0d0b0',
  S4: '#e8dcc0',
  S5: '#f0e8d0',
  S6: '#fff8e8',

  // === BRIM — warm brown ===
  B0: '#2c1810',
  B1: '#483020',
  B2: '#604018',
  B3: '#785828',
  B4: '#907040',
  B5: '#a88858',
  B6: '#c0a070',

  // === SKIN — warm peach (7 tones) ===
  K0: '#786040',
  K1: '#987850',
  K2: '#b09060',
  K3: '#c0a070',
  K4: '#d0b888',
  K5: '#e0d0a0',
  K6: '#f0e0c0',
  K7: '#f8f0d8',

  // === EYES ===
  EP: '#181008',  // pupil
  EM: '#302010',  // pupil mid
  EI: '#503820',  // iris
  EW: '#e8e0d0',  // white
  ES: '#ffffff',  // shine
  EB: '#c88888',  // blush
  MO: '#885040',  // mouth

  // === CLOAK GREENS — shadows→blue-teal, highlights→yellow (12 tones) ===
  G0: '#081808',
  G1: '#102810',
  G2: '#183818',
  G3: '#204820',
  G4: '#286028',
  G5: '#308030',
  G6: '#38a038',
  G7: '#48b840',
  G8: '#58c848',
  G9: '#68d850',
  GA: '#80e860',
  GB: '#98f078',

  // Leaf vein highlights
  GV: '#a8f888',

  // === STAFF WOOD — warm brown (6 tones) ===
  W0: '#201008',
  W1: '#382018',
  W2: '#503020',
  W3: '#684028',
  W4: '#805030',
  W5: '#986840',

  // === LEAF ON STAFF ===
  L0: '#185010',
  L1: '#288020',
  L2: '#40a830',
  L3: '#58d040',
  L4: '#78e858',
  L5: '#a0f880',

  // === DITHER helper ===
  // For checkerboard texture between two colors
};

// ── Drawing helpers ──
function px(x,y,c){bc.fillStyle=c;bc.fillRect(x,y,1,1);}
function hL(x,y,cs){for(let i=0;i<cs.length;i++)if(cs[i]){bc.fillStyle=cs[i];bc.fillRect(x+i,y,1,1);}}

// Dithered fill between two colors (checkerboard pattern)
function dither(x,y,w,h,c1,c2){
  for(let dy=0;dy<h;dy++)for(let dx=0;dx<w;dx++){
    bc.fillStyle=(dx+dy)%2===0?c1:c2;bc.fillRect(x+dx,y+dy,1,1);
  }
}

// ══════════════════════════════════════════════════════
//  CHARACTER PARTS — With Selout, AA, Dithering
// ══════════════════════════════════════════════════════

function drawCap(ox, oy) {
  const O=P.OC, Oa=P.C0; // selout outline = dark red, AA = darker red
  // Anti-alias row (soften dome top edge against dark background)
  hL(ox+10,oy-1,[Oa,Oa,Oa,Oa,Oa,Oa,Oa,Oa]);

  // Row 0: top of dome — selout dark red outline
  hL(ox+9,oy,[Oa,O,O,O,O,O,O,O,O,Oa]);

  // Row 1: upper dome
  hL(ox+7,oy+1,[Oa,O,P.C8,P.C9,P.CA,P.CB,P.CA,P.C9,P.C8,P.C7,P.C6,O,Oa]);

  // Row 2: wider — spot appears
  hL(ox+5,oy+2,[Oa,O,P.C6,P.C7,P.C8,P.C9,P.CA,P.CB,P.CA,P.C9,P.C8,P.C7,P.C6,P.C5,O,Oa]);

  // Row 3: first big spot (top-left)
  hL(ox+4,oy+3,[O,P.C4,P.C5,P.C6,P.S2,P.S3,P.S5,P.S6,P.S5,P.S3,P.C8,P.C7,P.C7,P.C6,P.C5,P.C4,O]);

  // Row 4: big spot continues + smaller spot on right
  hL(ox+3,oy+4,[O,P.C3,P.C4,P.S0,P.S1,P.S3,P.S5,P.S6,P.S5,P.S3,P.S1,P.C7,P.C6,P.S2,P.S4,P.S5,P.S3,P.C5,P.C4,O]);

  // Row 5: spots end, cap body
  hL(ox+2,oy+5,[O,P.C2,P.C3,P.C5,P.S0,P.S2,P.S4,P.S5,P.S3,P.S1,P.C7,P.C6,P.S1,P.S3,P.S5,P.S5,P.S3,P.S1,P.C4,P.C3,P.C2,O]);

  // Row 6: widest — dithered texture
  hL(ox+1,oy+6,[O,P.C1,P.C2,P.C3,P.C5,P.C6,P.C7,P.C8,P.C7,P.C7,P.C6,P.C5,P.S0,P.S2,P.S4,P.S3,P.S1,P.C5,P.C4,P.C3,P.C2,P.C1,O]);

  // Row 7: wide — with bottom spot and dither between C5/C6
  hL(ox+1,oy+7,[O,P.C1,P.C2,P.C3,P.C4,P.C5,P.C6,P.S2,P.S4,P.S5,P.S3,P.C6,P.C5,P.C5,P.C5,P.C5,P.C5,P.C4,P.C3,P.C2,P.C1,P.C1,O]);

  // Row 8: narrowing — dithered texture
  hL(ox+1,oy+8,[O,P.C1,P.C1,P.C2,P.C3,P.C4,P.C5,P.S0,P.S2,P.S3,P.S1,P.C5,P.C4,P.C4,P.C4,P.C4,P.C4,P.C3,P.C3,P.C2,P.C1,P.C1,O]);

  // Row 9: more narrow
  hL(ox+1,oy+9,[O,P.C0,P.C1,P.C2,P.C3,P.C3,P.C4,P.C5,P.C5,P.C4,P.C4,P.C3,P.C3,P.C3,P.C3,P.C3,P.C3,P.C2,P.C2,P.C1,P.C0,P.C0,O]);

  // Row 10: bottom of dome
  hL(ox+2,oy+10,[O,P.C0,P.C0,P.C1,P.C2,P.C3,P.C4,P.C4,P.C3,P.C3,P.C2,P.C2,P.C2,P.C2,P.C1,P.C1,P.C0,P.C0,O,Oa]);

  // Row 11: cap bottom edge
  hL(ox+1,oy+11,[O,O,O,O,O,O,O,O,O,O,O,O,O,O,O,O,O,O,O,O,O,O]);

  // BRIM — selout brown outline
  const Ob = P.OB;
  hL(ox+3,oy+12,[Ob,P.B1,P.B2,P.B3,P.B4,P.B5,P.B6,P.B5,P.B5,P.B4,P.B5,P.B6,P.B5,P.B4,P.B3,P.B2,P.B1,Ob]);
  // Brim underside shadow
  hL(ox+4,oy+13,[Ob,P.B0,P.B1,P.B2,P.B1,P.B2,P.B1,P.B2,P.B1,P.B2,P.B1,P.B2,P.B1,P.B0,Ob,Ob]);
  hL(ox+5,oy+14,[Ob,Ob,Ob,Ob,Ob,Ob,Ob,Ob,Ob,Ob,Ob,Ob,Ob,Ob]);
}

function drawFace(ox, oy, blink) {
  const O = P.OF;
  // Row 0: forehead under brim
  hL(ox,oy,[O,P.K2,P.K3,P.K4,P.K5,P.K6,P.K7,P.K6,P.K5,P.K4,P.K3,O]);
  // Row 1: upper face
  hL(ox,oy+1,[O,P.K3,P.K4,P.K5,P.K6,P.K7,P.K7,P.K6,P.K5,P.K4,P.K3,O]);

  if (blink) {
    // Eyes closed — horizontal lines
    hL(ox,oy+2,[O,P.K3,P.EM,P.EM,P.K5,P.K6,P.K6,P.K5,P.EM,P.EM,P.K3,O]);
    hL(ox,oy+3,[O,P.K2,P.K3,P.K4,P.K5,P.K6,P.K6,P.K5,P.K4,P.K3,P.K2,O]);
  } else {
    // Row 2: eyes — 3 wide per eye (white, iris, pupil) with shine
    hL(ox,oy+2,[O,P.K3,P.EW,P.EI,P.EP,P.K6,P.K6,P.EW,P.EI,P.EP,P.K3,O]);
    // Shine pixels (overwrite)
    px(ox+2,oy+2,P.ES);
    px(ox+8,oy+2,P.ES);
    // Row 3: lower eye + blush
    hL(ox,oy+3,[O,P.EB,P.EW,P.EM,P.K5,P.K6,P.K6,P.EW,P.EM,P.EB,P.K2,O]);
  }

  // Row 4: mouth — small curve
  hL(ox,oy+4,[O,P.K2,P.K3,P.K4,P.K5,P.MO,P.MO,P.K5,P.K4,P.K3,P.K2,O]);
  // Row 5: lower face
  hL(ox,oy+5,[O,P.K1,P.K2,P.K3,P.K4,P.K5,P.K5,P.K4,P.K3,P.K2,P.K1,O]);
  // Row 6: chin — selout lighter
  hL(ox+1,oy+6,[P.OF,P.K0,P.K1,P.K2,P.K3,P.K3,P.K2,P.K1,P.K0,P.OF]);
}

function drawCloak(ox, oy, sway) {
  const O = P.OG;
  const s = sway;

  // Neck
  hL(ox+2,oy,[O,P.G3,P.G4,P.G5,P.G5,P.G4,P.G3,O]);
  // Shoulders — wider
  hL(ox+1,oy+1,[O,P.G2,P.G3,P.G5,P.G6,P.G7,P.G6,P.G5,P.G3,O]);
  // Upper body with leaf fold detail
  hL(ox,oy+2,[O,P.G2,P.G3,P.G4,P.G6,P.G8,P.G9,P.G8,P.G6,P.G4,P.G3,O]);
  hL(ox,oy+3,[O,P.G1,P.G3,P.G5,P.G7,P.G9,P.GA,P.G8,P.G6,P.G5,P.G3,P.G2,O]);
  // Mid body — leaf texture with dithered shading
  hL(ox-1,oy+4,[O,P.G1,P.G2,P.G4,P.G6,P.G7,P.G9,P.GA,P.G9,P.G7,P.G5,P.G3,P.G2,O]);
  hL(ox-1,oy+5,[O,P.G1,P.G3,P.G5,P.G7,P.G8,P.GA,P.GB,P.GA,P.G8,P.G6,P.G4,P.G2,O]);
  // Leaf vein highlights
  px(ox+3,oy+4,P.GV); px(ox+7,oy+5,P.GV);

  // Lower body — expanding with leaf shapes
  hL(ox-2,oy+6,[O,P.G0,P.G2,P.G3,P.G5,P.G7,P.G8,P.GA,P.GB,P.GA,P.G8,P.G6,P.G4,P.G2,O]);
  hL(ox-2+s,oy+7,[O,P.G0,P.G1,P.G3,P.G5,P.G7,P.G9,P.GA,P.G8,P.G7,P.G9,P.GA,P.G7,P.G4,P.G2,O]);
  // Leaf veins
  px(ox+1+s,oy+7,P.GV); px(ox+8+s,oy+7,P.GV);

  // Widening with distinct leaf shapes
  hL(ox-3+s,oy+8,[O,P.G0,P.G1,P.G3,P.G5,P.G7,P.G9,P.GA,P.GB,P.GA,P.G8,P.G7,P.G9,P.GA,P.G8,P.G4,P.G2,O]);
  hL(ox-3+s,oy+9,[O,P.G0,P.G2,P.G4,P.G6,P.G8,P.GA,P.G9,P.G6,P.G5,P.G7,P.G9,P.GA,P.G8,P.G5,P.G3,P.G1,O]);

  // Jagged leaf edges at bottom — with AA
  hL(ox-4+s,oy+10,[O,P.G0,P.G2,P.G4,P.G7,P.G9,P.G6,P.G3,O,P.G1,P.G4,P.G7,P.G9,P.G7,P.G4,P.G2,P.G0,O]);
  hL(ox-4+s,oy+11,[P.OL,O,P.G1,P.G4,P.G7,O,P.G3,O,null,O,P.G3,P.G6,O,P.G6,P.G3,O,O,P.OL]);
  // Leaf tips with AA
  hL(ox-3+s,oy+12,[null,O,P.G0,O,null,null,O,null,null,null,O,O,null,O,O]);
  hL(ox-2+s,oy+13,[null,null,O]);
}

function drawStaff(ox, oy) {
  const O = P.OW;

  // Staff leaf cluster at top — detailed with veins
  px(ox,oy-7,P.L2);px(ox+1,oy-7,P.L4);
  px(ox-1,oy-6,P.L1);px(ox,oy-6,P.L3);px(ox+1,oy-6,P.L5);px(ox+2,oy-6,P.L3);
  px(ox-1,oy-5,P.L0);px(ox,oy-5,P.L2);px(ox+1,oy-5,P.L4);px(ox+2,oy-5,P.L2);
  px(ox,oy-4,P.L0);px(ox+1,oy-4,P.L1);
  // Leaf vein
  px(ox+1,oy-6,P.GV);

  // Staff connection
  px(ox+1,oy-3,O);

  // Staff pole with wood grain texture
  for (let i = -2; i < 28; i++) {
    // Base color gradient (lighter at top, darker at bottom)
    let c;
    if (i < 4) c = P.W5;
    else if (i < 10) c = P.W4;
    else if (i < 18) c = P.W3;
    else c = P.W2;
    px(ox+1,oy+i,c);

    // Wood grain — alternating lighter/darker streaks
    if (i % 3 === 0 && i > 0) {
      px(ox+1,oy+i, i<12 ? P.W4 : P.W1); // grain line
    }

    // Knots — small dark spots with ring
    if (i === 5)  { px(ox,oy+i,P.W3); px(ox+2,oy+i,P.W4); }
    if (i === 12) { px(ox,oy+i,P.W1); px(ox+2,oy+i,P.W2); }
    if (i === 19) { px(ox+2,oy+i,P.W1); }
    if (i === 24) { px(ox,oy+i,P.W0); }

    // Bark texture: second pixel on some rows
    if (i > 15 && i % 4 === 0) px(ox+2,oy+i,P.W1);
  }

  // Staff outline at ends
  px(ox+1,oy-2,O);
  px(ox+1,oy+27,O);
}

function drawFeet(ox, oy, walkStep) {
  const O = P.OW;
  // Small boots with visible sole
  if (walkStep === 0 || walkStep === 2) {
    hL(ox,oy,[O,P.W2,P.W3,P.W4,O,null,O,P.W2,P.W3,P.W4,O]);
    hL(ox,oy+1,[O,P.W1,P.W1,O,O,null,O,P.W1,P.W1,O,O]);
  } else if (walkStep === 1) {
    hL(ox-2,oy,[O,P.W2,P.W3,P.W4,O,null,null,null,null,O,P.W2,P.W3,P.W4,O]);
    hL(ox-2,oy+1,[O,P.W1,P.W1,O,O,null,null,null,null,O,P.W1,P.W1,O,O]);
  } else {
    hL(ox-1,oy,[O,P.W2,P.W3,P.W4,O,null,null,null,null,O,P.W2,P.W3,P.W4,O]);
    hL(ox-1,oy+1,[O,P.W1,P.W1,O,O,null,null,null,null,O,P.W1,P.W1,O,O]);
  }
}

// ══════════════════════════════════════════════════════
//  DRAW CHARACTER — Grounding pattern from skill
// ══════════════════════════════════════════════════════
function drawDruid(bob, blink, walkStep) {
  bc.clearRect(0, 0, W, H);
  const baseX = 10;
  const walkBounce = (walkStep >= 0 && (walkStep === 1 || walkStep === 3)) ? 1 : 0;
  const baseY = 6 + bob + walkBounce;
  const cloakSway = (walkStep === 1) ? -1 : (walkStep === 3) ? 1 : 0;

  // Staff behind character
  drawStaff(baseX + 22, baseY + 2);
  // Cap with selout and AA
  drawCap(baseX - 2, baseY);
  // Face with detailed eyes
  drawFace(baseX + 5, baseY + 15, blink);
  // Cloak with leaf detail and dithering
  drawCloak(baseX + 5, baseY + 22, cloakSway);
  // Feet — FIXED Y (grounding)
  const feetY = 6 + 35;
  drawFeet(baseX + 5, feetY, walkStep === -1 ? 0 : walkStep);
}

// ══════════════════════════════════════════════════════
//  ANIMATION STATE + LOOP
// ══════════════════════════════════════════════════════
const RENDER_SCALE = 5;
const GROUND_Y = 290;
const CHAR_DRAW_Y = GROUND_Y - 44 * RENDER_SCALE;

const st = {
  x: 160, dir: 1,
  walking: false, walkDir: 0, walkFrame: -1,
  animFrame: 0,
  blinkTimer: 0, blink: false,
  attackTimer: -1,
  particles: [],
};

function spawnP(x, y, type) {
  const cols = type === 'magic'
    ? ['#78e050','#50c038','#a0f070','#ccffcc','#ffffff']
    : ['#58c848','#389830','#68d850','#98f078'];
  st.particles.push({
    x: x + (Math.random()-0.5)*20,
    y: y - Math.random()*10,
    vx: (Math.random()-0.5)*2.5,
    vy: -Math.random()*1.5 - 0.5,
    life: 35 + Math.random()*35,
    mx: 70,
    c: cols[Math.floor(Math.random()*cols.length)],
    sz: 2 + Math.random()*3,
  });
}

const lbl = document.getElementById('lbl');
let lastTick = 0;

function loop(ts) {
  if (ts - lastTick > 150) {
    lastTick = ts;
    st.animFrame++;

    st.blinkTimer++;
    if (st.blinkTimer > 22 + Math.random()*25) {
      st.blink = true;
      if (st.blinkTimer > 25 + Math.random()*25) { st.blink = false; st.blinkTimer = 0; }
    }

    if (st.walking) st.walkFrame = (st.walkFrame + 1) % 4;
    else st.walkFrame = -1;

    if (st.attackTimer >= 0) {
      st.attackTimer++;
      if (st.attackTimer < 18 && st.animFrame % 2 === 0) {
        const sx = st.x + (st.dir === 1 ? 140 : 20);
        spawnP(sx, CHAR_DRAW_Y + 20 + Math.random()*30, 'magic');
        spawnP(sx, CHAR_DRAW_Y + 10 + Math.random()*20, 'magic');
      }
      if (st.attackTimer > 25) st.attackTimer = -1;
    }
  }

  // Smooth movement
  if (st.walking) {
    st.x += st.walkDir * 2;
    st.dir = st.walkDir;
    if (st.x < 10) st.x = 10;
    if (st.x > display.width - 160) st.x = display.width - 160;
    if (st.animFrame % 3 === 0) {
      const footX = st.dir === 1 ? st.x + 70 : st.x + W * RENDER_SCALE - 70;
      spawnP(footX, GROUND_Y - 20, 'leaf');
    }
  }

  // ── Render ──
  dctx.clearRect(0, 0, display.width, display.height);

  // Ground
  dctx.fillStyle = '#222240';
  dctx.fillRect(30, GROUND_Y, display.width - 60, 1);

  // Shadow
  const shadowX = st.dir === 1 ? st.x + 68 : st.x + W * RENDER_SCALE - 68;
  dctx.fillStyle = 'rgba(0,0,0,0.30)';
  dctx.beginPath();
  dctx.ellipse(shadowX, GROUND_Y, 32, 6, 0, 0, Math.PI * 2);
  dctx.fill();

  // Character
  const bob = st.animFrame % 2 === 0 ? 0 : 1;
  drawDruid(bob, st.blink, st.walkFrame);

  dctx.save();
  if (st.dir === -1) {
    dctx.translate(display.width, 0);
    dctx.scale(-1, 1);
    dctx.drawImage(buf, display.width - st.x - W*RENDER_SCALE, CHAR_DRAW_Y, W*RENDER_SCALE, H*RENDER_SCALE);
  } else {
    dctx.drawImage(buf, st.x, CHAR_DRAW_Y, W*RENDER_SCALE, H*RENDER_SCALE);
  }
  dctx.restore();

  // Attack glow
  if (st.attackTimer >= 0 && st.attackTimer < 25) {
    const prog = st.attackTimer / 25;
    const gx = st.x + (st.dir === 1 ? 145 : 15);
    const gy = CHAR_DRAW_Y + 30;
    for (let i = 0; i < 6; i++) {
      const a = (i/6)*Math.PI*2 + prog*6;
      const r = 8 + prog*45;
      dctx.globalAlpha = Math.max(0, 1-prog)*0.7;
      dctx.fillStyle = i%2===0 ? '#78e050' : '#a0f070';
      dctx.fillRect((gx+Math.cos(a)*r)|0, (gy+Math.sin(a)*r*0.6)|0, 4, 4);
    }
    dctx.globalAlpha = Math.max(0,1-prog)*0.3;
    dctx.fillStyle = '#bbffbb';
    dctx.beginPath(); dctx.arc(gx, gy, 6+prog*35, 0, Math.PI*2); dctx.fill();
    dctx.globalAlpha = 1;
  }

  // Particles
  for (let i = st.particles.length-1; i >= 0; i--) {
    const p = st.particles[i];
    p.x += p.vx; p.y += p.vy; p.vy -= 0.015; p.life--;
    dctx.globalAlpha = Math.min(1, p.life/(p.mx*0.35));
    dctx.fillStyle = p.c;
    dctx.fillRect(p.x|0, p.y|0, p.sz, p.sz);
    if (p.life <= 0) st.particles.splice(i, 1);
  }
  dctx.globalAlpha = 1;

  lbl.textContent = st.attackTimer >= 0 ? 'casting' : st.walking ? 'walking' : 'idle';
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Input ──
document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft')  { st.walking=true; st.walkDir=-1; e.preventDefault(); }
  if (e.key==='ArrowRight') { st.walking=true; st.walkDir=1; e.preventDefault(); }
  if (e.key===' ' && st.attackTimer<0) { st.attackTimer=0; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  if (e.key==='ArrowLeft'  && st.walkDir===-1) st.walking=false;
  if (e.key==='ArrowRight' && st.walkDir===1)  st.walking=false;
});
const bL=document.getElementById('bL'), bR=document.getElementById('bR');
bL.onmousedown=()=>{st.walking=true;st.walkDir=-1};
bL.onmouseup=bL.onmouseleave=()=>{if(st.walkDir===-1)st.walking=false};
bR.onmousedown=()=>{st.walking=true;st.walkDir=1};
bR.onmouseup=bR.onmouseleave=()=>{if(st.walkDir===1)st.walking=false};
bL.ontouchstart=e=>{e.preventDefault();st.walking=true;st.walkDir=-1};
bL.ontouchend=e=>{e.preventDefault();if(st.walkDir===-1)st.walking=false};
bR.ontouchstart=e=>{e.preventDefault();st.walking=true;st.walkDir=1};
bR.ontouchend=e=>{e.preventDefault();if(st.walkDir===1)st.walking=false};
display.onclick=()=>{if(st.attackTimer<0)st.attackTimer=0};
</script>
</body>
</html>
